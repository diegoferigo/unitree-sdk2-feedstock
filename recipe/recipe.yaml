context:
  version: 2.0.2

package:
  name: unitree-sdk2
  version: ${{ version }}

source:
  url: https://github.com/unitreerobotics/unitree_sdk2/archive/refs/tags/${{ version }}.zip
  sha256: aa05c28463b9f3c9459efce19485a9777644b5671eb10908f9ae0de880e0b2cc
  patches:
    - add-sched-include.patch
    - fix-destructors-cpp20.patch
    - rename-vendored-dds-shlib.patch

build:
  number: 2
  skip: not linux
  script:
    - if: x86_64
      then:
        - cd thirdparty/lib/x86_64
    - if: aarch64
      then:
        - cd thirdparty/lib/aarch64
    # Rename the vendored libraries to avoid conflicts with cyclonedds.
    - patchelf --replace-needed libddsc.so.0 libddsc_unitree.so.0 libddscxx.so
    - mv libddsc.so libddsc_unitree.so
    - mv libddscxx.so libddscxx_unitree.so
    - rm libddsc.so.0 libddscxx.so.0
    - ln -s libddsc_unitree.so libddsc_unitree.so.0
    - ln -s libddscxx_unitree.so libddscxx_unitree.so.0
    - ldd libddscxx_unitree.so
    - ls -lah
    - cd -
    # Build and install the SDK.
    - cmake -S . -B build/
      -GNinja
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=$PREFIX
      -DBUILD_EXAMPLES=OFF
      -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=NEVER
    - cmake --build build/ --target install

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
    - patchelf
  host:
  run:

tests:
  - script:
      - cmake-package-check unitree_sdk2 --targets unitree_sdk2 ddsc ddscxx
    requirements:
      run:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake-package-check
  - script:
      - echo "Checking stdlib compatibility of installed shared libraries..."
      - export c_stdlib_version=${{ c_stdlib_version }}
      - check-glibc lib/*.so* lib/*.a*
    requirements:
      run:
        - cf-nvidia-tools
  - script:
      - ldd $PREFIX/lib/libddsc_unitree.so
      - ldd $PREFIX/lib/libddscxx_unitree.so
      - touch CMakeLists.txt
      - echo "cmake_minimum_required(VERSION 3.16)" >> CMakeLists.txt
      - echo "project(unitree_examples CXX)" >> CMakeLists.txt
      - echo "find_package(unitree_sdk2 CONFIG REQUIRED)" >> CMakeLists.txt
      - echo "add_subdirectory(example)" >> CMakeLists.txt
      - cmake -S . -B build/ -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$PREFIX
      - cmake --build build/
    files:
      source:
        - example/
    requirements:
      run:
        - cmake
        - eigen
        - ninja
        - yaml-cpp

about:
  homepage: https://support.unitree.com/home/zh/developer
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/unitreerobotics/unitree_sdk2
  summary: Unitree robot sdk version 2.

extra:
  recipe-maintainers:
    - diegoferigo
